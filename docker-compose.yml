version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: pg-auto
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 7285872858  # Измените на свой пароль!
      POSTGRES_DB: autodb
    ports:
      - "5433:5432"  # 5433 на хосте, чтобы не конфликтовать с локальным PostgreSQL
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: auto-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://postgres:7285872858@postgres:5432/autodb  # Пароль должен совпадать!
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata: