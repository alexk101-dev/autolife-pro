<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AutoLife Pro</title>
    
    <!-- Fonts & Libraries -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="globalLoader" class="hidden">
    <div class="loading-spinner"></div>
</div>

<div class="container">
    <!-- Автомобили -->
    <div class="card" id="carsCard">
        <div class="card-header">
            <span class="card-title">Мои автомобили</span>
            <button class="icon-btn" onclick="openCarsModal()">
                <span class="material-symbols-outlined" style="font-size:18px; margin-right:4px;">directions_car</span>
                Все
            </button>
        </div>
        <div id="carList" class="car-scroll"></div>
        <button class="btn btn-add-car" style="margin-top:8px;" onclick="showAddCarModal()">+ Добавить авто</button>
    </div>

    <!-- Главная -->
    <div id="homeTab" class="tab active">
        <!-- Статистика -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Расход</div>
                <div class="stat-value" id="consumption">--<span class="stat-unit">л/100км</span></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Пробег</div>
                <div class="stat-value" id="mileage">--<span class="stat-unit">км</span></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Заправок</div>
                <div class="stat-value" id="fuelCount">--</div>
            </div>
        </div>

        <!-- Масло -->
        <div class="oil-card">
            <div class="oil-header">
                <span class="oil-title">Замена масла</span>
                <span class="oil-value" id="oilRemaining">-- км</span>
            </div>
            <div class="progress-bar">
                <div id="oilProgress" class="progress-fill"></div>
            </div>
            <div class="progress-labels">
                <span>0 км</span>
                <span id="oilInterval">10 000 км</span>
            </div>
        </div>

        <!-- Последние записи -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">Последние записи</span>
                <span style="color: var(--accent); font-size: 14px; cursor: pointer;" onclick="switchTab('add')">+ Добавить</span>
            </div>
            <div id="historyList"></div>
            <div id="historyEmpty" class="empty-state hidden">
                <div class="empty-icon">📝</div>
                <div>Нет записей</div>
                <div style="font-size: 13px; margin-top: 8px;">Нажмите "Добавить"</div>
            </div>
        </div>
    </div>

    <!-- Статистика -->
    <div id="statsTab" class="tab">
        <div class="card">
            <div class="card-header">
                <span class="card-title">Расходы по категориям</span>
                <select id="statsPeriod" onchange="loadStats()" style="border: none; background: none; font-size: 14px;">
                    <option value="month">Месяц</option>
                    <option value="year">Год</option>
                    <option value="all">Всё время</option>
                </select>
            </div>
            <canvas id="chartCat" height="200"></canvas>
            <div id="statsEmpty" class="empty-state hidden">
                <div class="empty-icon">📊</div>
                <div>Нет данных</div>
            </div>
        </div>
        <div class="card">
            <div class="card-header">
                <span class="card-title">Цена топлива</span>
            </div>
            <canvas id="chartPrice" height="150"></canvas>
            <div id="fuelEmpty" class="empty-state hidden">
                <div class="empty-icon">⛽</div>
                <div>Нет записей</div>
            </div>
        </div>
    </div>

    <!-- Добавление -->
    <div id="addTab" class="tab">
        <div class="card">
            <div class="form-group">
                <label class="form-label">Тип</label>
                <select id="recordType" class="form-select" onchange="toggleRecordFields()">
                    <option value="expense">Расход / Ремонт</option>
                    <option value="fuel">Заправка</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Сумма (₽)</label>
                <input type="number" id="amount" class="form-input" placeholder="0" step="0.01">
            </div>
            <div id="fuelFields" class="hidden">
                <div class="form-group">
                    <label class="form-label">Литры</label>
                    <input type="number" id="liters" class="form-input" placeholder="0" step="0.01">
                </div>
                <div class="form-group">
                    <label class="form-label">Пробег (км)</label>
                    <input type="number" id="fuelMileage" class="form-input" placeholder="15000">
                </div>
                <div class="form-group">
                    <label class="form-label">АЗС</label>
                    <input type="text" id="station" class="form-input" placeholder="Лукойл">
                </div>
                <div class="form-group">
                    <label style="display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="fullTank"> Полный бак
                    </label>
                </div>
            </div>
            <div id="expenseFields">
                <div class="form-group">
                    <label class="form-label">Категория</label>
                    <select id="category" class="form-select" onchange="updateServiceFieldsVisibility()">
                        <option value="🛠 Ремонт">🛠 Ремонт</option>
                        <option value="🧼 Мойка">🧼 Мойка</option>
                        <option value="📄 Страховка">📄 Страховка</option>
                        <option value="⚙️ ТО">⚙️ ТО</option>
                        <option value="🚗 Запчасти">🚗 Запчасти</option>
                        <option value="📦 Прочее">📦 Прочее</option>
                    </select>
                </div>
                <div id="serviceFields" class="form-group hidden">
                    <label class="form-label">Пробег при ТО (км)</label>
                    <input type="number" id="serviceMileage" class="form-input" placeholder="Например, 25 000">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Комментарий</label>
                <textarea id="comment" class="form-textarea" placeholder="Дополнительно" rows="3"></textarea>
            </div>
            <button class="btn" onclick="saveRecord()">Сохранить</button>
        </div>

        <!-- Быстрые действия -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">Быстрые действия</span>
            </div>
            <div class="quick-actions">
                <button class="quick-btn" onclick="quickAction('oil')">🛢️ Масло</button>
                <button class="quick-btn" onclick="quickAction('wash')">🧼 Мойка</button>
                <button class="quick-btn" onclick="quickAction('fuel')">⛽ Заправка</button>
                <button class="quick-btn" onclick="quickAction('insurance')">📄 Страховка</button>
                <button class="quick-btn" onclick="quickAction('service')">⚙️ ТО</button>
                <button class="quick-btn" onclick="quickAction('other')">📦 Другое</button>
            </div>
        </div>
    </div>

    <!-- Настройки -->
    <div id="settingsTab" class="tab">
        <div class="card">
            <div class="card-header">
                <span class="card-title">Настройки авто</span>
            </div>
           
            <div class="form-group">
                <label class="form-label">Название</label>
                <input type="text" id="settingsName" class="form-input">
            </div>
           
            <div class="form-group">
                <label class="form-label">Госномер</label>
                <input type="text" id="settingsReg" class="form-input">
            </div>
           
            <div class="form-group">
                <label class="form-label">Текущий пробег (км)</label>
                <input type="number" id="settingsMileage" class="form-input">
            </div>

            <!-- Новое поле -->
            <div class="form-group">
                <label class="form-label">Пробег при последней замене масла (км)</label>
                <input type="number" id="settingsLastOilChange" class="form-input" placeholder="Например, 24500">
            </div>
           
            <div class="form-group">
                <label class="form-label">Интервал масла (км)</label>
                <input type="number" id="settingsOilInterval" class="form-input" value="10000">
            </div>

            <!-- Выбор темы -->
            <div class="form-group">
                <label class="form-label">Тема приложения</label>
                <select id="themeSelect" class="form-select" onchange="applyUserTheme()">
                    <option value="system">Системная (по умолчанию)</option>
                    <option value="light">Светлая</option>
                    <option value="dark">Тёмная</option>
                </select>
            </div>
           
            <button class="btn" onclick="updateCarSettings()">Сохранить</button>
        </div>
    </div>
</div>

<!-- Навигация -->
<nav class="nav-bar">
    <button class="nav-btn active" onclick="switchTab('home', this)">
        <span class="nav-icon material-symbols-outlined">home</span>
        <span>Главная</span>
    </button>
    <button class="nav-btn" onclick="switchTab('stats', this)">
        <span class="nav-icon material-symbols-outlined">query_stats</span>
        <span>Статистика</span>
    </button>
    <button class="nav-btn" onclick="switchTab('add', this)">
        <span class="nav-icon material-symbols-outlined">add_circle</span>
        <span>Добавить</span>
    </button>
    <button class="nav-btn" onclick="switchTab('settings', this)">
        <span class="nav-icon material-symbols-outlined">settings</span>
        <span>Настройки</span>
    </button>
</nav>

<!-- Модальное окно добавления автомобиля -->
<div id="addCarModal" class="modal hidden" onclick="if(event.target===this) hideModal('addCarModal')">
    <div class="modal-content">
        <div class="modal-title">Новый автомобиль</div>
        <div class="form-group">
            <label class="form-label">Название</label>
            <input type="text" id="newCarName" class="form-input" placeholder="Audi A6">
        </div>
        <div class="form-group">
            <label class="form-label">Госномер</label>
            <input type="text" id="newCarReg" class="form-input" placeholder="A777AA">
        </div>
        <div class="form-group">
            <label class="form-label">Пробег</label>
            <input type="number" id="newCarMileage" class="form-input" placeholder="0">
        </div>
        <div class="modal-buttons">
            <button class="btn" style="background: var(--gray-light); color: var(--text-primary);" onclick="hideModal('addCarModal')">Отмена</button>
            <button class="btn" onclick="addNewCar()">Добавить</button>
        </div>
    </div>
</div>

<!-- Модальное окно списка автомобилей -->
<div id="carsModal" class="modal hidden" onclick="if(event.target===this) hideModal('carsModal')">
    <div class="modal-content">
        <div class="modal-title">Мои автомобили</div>
        <div id="carsModalList" class="cars-modal-list"></div>
        <div class="modal-buttons">
            <button class="btn" style="background: var(--gray-light); color: var(--text-primary);" onclick="hideModal('carsModal')">Закрыть</button>
            <button class="btn" onclick="showAddCarModal()">Добавить авто</button>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="script.js"></script>
</body>
</html>
